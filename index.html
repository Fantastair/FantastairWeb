    <script src="src/scripts/projects.js"></script>
    <script>
        const hitokotoText = document.getElementById('hitokoto-text');
        const hitokotoRefresh = document.getElementById('hitokoto-refresh');

        const CHAR_DELAY = 28; // 每个字的动画间隔(ms)
        const API = 'https://v1.hitokoto.cn/?min_length=3&max_length=36';

        let loading = false;
        let charSpans = [];

        function formatHitokoto(data) {
            const parts = [];
            if (data.from_who) parts.push(data.from_who);
            if (data.from) parts.push(`《${data.from}》`);
            return parts.length ? `${data.hitokoto} —— ${parts.join(' ')}` : data.hitokoto;
        }

        // 将文字拆成逐字 <span>
        function buildCharSpans(text) {
            hitokotoText.innerHTML = '';
            const chars = [...text];
            return chars.map((char, i) => {
                const span = document.createElement('span');
                span.className = 'char';
                span.textContent = char;
                span.style.setProperty('--i', i);
                hitokotoText.appendChild(span);
                return span;
            });
        }

        // 逐字出场（反向：从末尾到开头）
        function animateOut(spans) {
            return new Promise(resolve => {
                if (!spans.length) return resolve();
                const total = spans.length;
                spans.forEach((span, i) => {
                    span.style.setProperty('--i', total - 1 - i);
                    span.classList.add('exit');
                });
                const duration = total * CHAR_DELAY + 180;
                setTimeout(resolve, duration);
            });
        }

        // 逐字入场
        function animateIn(text) {
            return new Promise(resolve => {
                const spans = buildCharSpans(text);
                charSpans = spans;
                if (!spans.length) return resolve();
                const duration = spans.length * CHAR_DELAY + 250;
                setTimeout(resolve, duration);
            });
        }

        async function refreshHitokoto() {
            if (loading) return;
            loading = true;
            hitokotoRefresh.classList.add('spinning');

            const oldSpans = charSpans;
            const oldText = [...oldSpans].map(s => s.textContent).join('') || hitokotoText.textContent;

            // 退出动画 + 请求并行
            const [ , data ] = await Promise.all([
                animateOut(oldSpans),
                fetch(API).then(r => r.ok ? r.json() : Promise.reject()).catch(() => null)
            ]);

            if (data) {
                await animateIn(formatHitokoto(data));
            } else {
                await animateIn(oldText);
            }

            loading = false;
            hitokotoRefresh.classList.remove('spinning');
        }

        async function initHitokoto() {
            let data;
            try {
                const res = await fetch(API);
                if (!res.ok) throw new Error(res.status);
                data = await res.json();
            } catch {
                return;
            }
            await animateIn(formatHitokoto(data));
        }

        hitokotoRefresh.addEventListener('click', refreshHitokoto);
        initHitokoto();
    </script>
